name: WhatsApp Islamic Post Sender

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  send-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run WhatsApp Bot
        env:
          ULTRAMSG_TOKEN: ${{ secrets.ULTRAMSG_TOKEN }}
          ULTRAMSG_INSTANCE: ${{ secrets.ULTRAMSG_INSTANCE }}
        run: python bot.py

      - name: Save updated database
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add posts_db.json
          git diff --cached --quiet || git commit -m "update posts_db [skip ci]"
          git push
