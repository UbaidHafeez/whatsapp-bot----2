name: WhatsApp Islamic Post Sender
on:
  schedule:
    # Runs at 00:00 UTC = 5:00 AM PKT (delivers ~7:00 AM PKT after delay)
    - cron: '0 0 * * *'
    # Runs at 12:00 UTC = 5:00 PM PKT (delivers ~7:00 PM PKT after delay)
    - cron: '0 12 * * *'
  workflow_dispatch:  # Allows manual trigger from GitHub Actions UI
jobs:
  send-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to push posts_db.json back to repo
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run WhatsApp Bot
        env:
          ULTRAMSG_TOKEN: ${{ secrets.ULTRAMSG_TOKEN }}
          ULTRAMSG_INSTANCE: ${{ secrets.ULTRAMSG_INSTANCE }}
        run: python bot.py
      - name: Commit updated database
        run: |
          git config --global user.name "github-actions[bot]" 
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add posts_db.json
          git diff --cached --quiet || git commit -m "update posts_db [skip ci]"
          git push
